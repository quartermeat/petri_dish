plugins {
    id 'com.android.application'
}

android {
    namespace 'com.quartermeat.petridish'
    compileSdk 35

    defaultConfig {
        applicationId "com.quartermeat.petridish"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation files('libs/PetriDish.aar')
}
